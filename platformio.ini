;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeed_xiao_nrf52840_sense]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
board = seeed-xiao-afruitnrf52-nrf52840-sense
framework = arduino
build_flags =
  -IC:/Users/escob/.platformio/packages/framework-arduinoadafruitnrf52/libraries/Adafruit_TinyUSB_Arduino/src
lib_deps =
  https://github.com/Seeed-Studio/Seeed_Arduino_LSM6DS3
  adafruit/Adafruit LSM6DS @ ^4.7.2
  adafruit/Adafruit AHRS @ ^2.3.3
  adafruit/Adafruit Unified Sensor @ ^1.1.14